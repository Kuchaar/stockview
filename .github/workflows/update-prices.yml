name: Update stock prices

on:
  schedule:
    # Every weekday at 18:05 CET (16:05 UTC) — after GPW closes at 17:00
    - cron: '5 16 * * 1-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest prices from Yahoo Finance
        run: node scripts/fetch-stooq.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "No price changes detected"
          else
            git commit -m "chore: update stock prices $(date -u +%Y-%m-%d)"
            git push
          fi
